                    Menu
                    <i class="fas fa-bars ms-1"></i>

                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                        <li class="nav-item"><a class="nav-link" href="index.html#services">Services</a></li>

        <header class="masthead" style="padding-top: 120px;">
            <div class="container text-center">
                <div class="masthead-subheading">JOKES</div>
                <div class="masthead-heading text-uppercase">Joke Generator</div>
                <button class="btn btn-primary btn-xl text-uppercase" id="generateJokeButton" type="button">Tell me a joke</button>
            </div>
        </header>
        <section class="page-section bg-light">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-8 text-center">
                        <p class="lead mb-4" id="jokeText">Press the button to get a joke.</p>
                        <p class="text-muted">Each click shows a new funny line.</p>
                        <a class="btn btn-secondary btn-xl text-uppercase" href="index.html#page-top">Back to Home</a>
                    </div>
                </div>
            </div>
        </section>
        <footer class="footer py-4">

                        <a class="link-dark text-decoration-none" href="#!">Terms of Use</a>
                    </div>
                </div>
            </div>
        </footer>
        <script>
            const jokes = [
                "Why don't scientists trust atoms? Because they make up everything!",
                "Why did the web developer leave the restaurant? Because of the table layout!",
                "Why did the scarecrow win an award? Because he was outstanding in his field.",
                "What do you call fake spaghetti? An impasta.",
                "Why don't programmers like nature? It has too many bugs.",
                "What do you call cheese that isn't yours? Nacho cheese.",
                "Why did the computer show up at work late? It had a hard drive.",
                "What did the farmer say when he lost his tractor? 'Where's my tractor?'",
                "Why was the gardener embarrassed? Because he wet his plants."
            ];
            function generateJoke() {
                const jokeText = document.getElementById('jokeText');
                const joke = jokes[Math.floor(Math.random() * jokes.length)];
                jokeText.textContent = joke;
            }
            document.addEventListener('DOMContentLoaded', () => {
                const button = document.getElementById('generateJokeButton');
                if (button) {
                    button.addEventListener('click', generateJoke);
                }
            });
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
